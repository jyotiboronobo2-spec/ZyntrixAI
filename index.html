<!DOCTYPE html>
<html>
<head>
<title>ZyntrixAI Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  text-align: center;
}

.card {
  background: #020617;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
}

button {
  padding: 10px 20px;
  background: #3b82f6;
  border: none;
  color: white;
  border-radius: 5px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>ZyntrixAI Earn 💸</h1>
<p>Watch ads & earn money</p>

<div class="card">
  <h3>💰 Your Balance: ₹ <span id="balance">0</span></h3>
</div>

<div class="card">
  <h3>🎥 Watch Ad & Earn</h3>
  <button onclick="watchAd()">Watch Ad</button>
</div>

<div class="card">
  <h3>📲 Install App & Earn</h3>
  <button onclick="openOffer()">Install Now</button>
</div>

<div class="card">
  <h3>💳 Withdraw</h3>
  <button onclick="withdraw()">Withdraw</button>
</div>

<script>
let balance = 0;

// AD EARNING
function watchAd() {
  alert("Ad playing...");

  setTimeout(() => {
    let total = 10;
    let userEarn = total * 0.4; // 40%
    balance += userEarn;

    document.getElementById("balance").innerText = balance;

    alert("You earned ₹" + userEarn);
  }, 3000);
}

// OFFERWALL
function openOffer() {
  window.open("https://your-offerwall-link.com");
}

// WITHDRAW
function withdraw() {
  if (balance < 50) {
    alert("Minimum ₹50 required");
  } else {
    alert("Withdrawal requested!");
    balance = 0;
    document.getElementById("balance").innerText = balance;
  }
}
</script>

</body>
</html>
