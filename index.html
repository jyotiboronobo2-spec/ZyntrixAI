<!DOCTYPE html>
<html>
<head>
  <title>ZyntrixAI Earn</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #00000050;
      padding: 15px;
      margin: 15px;
      border-radius: 10px;
    }
    button {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 5px;
    }
    input {
      padding: 10px;
      width: 80%;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>ZyntrixAI Earn 💸</h1>
<div class="card">
  <h3>📤 Share & Earn</h3>
  <button onclick="shareApp()">Share App</button>
</div>
  <p>Watch ads & earn money</p>

<h2>Balance: ₹ <span id="balance">0</span></h2>

<div class="card">
  <h3>🎥 Watch Ad</h3>
  <button onclick="watchAd()">Watch & Earn ₹4</button>
</div>

<div class="card">
  <h3>💳 Withdraw</h3>
  <input type="text" id="upi" placeholder="Enter UPI ID">
  <button onclick="withdraw()">Withdraw</button>
</div>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_YOUR_KEY",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "user1"; // simple user

// Load balance
db.ref("users/" + user).on("value", snap => {
  let bal = snap.val()?.balance || 0;
  document.getElementById("balance").innerText = bal;
});

// Watch ad (demo)
function watchAd() {
  alert("Ad playing...");
  
  setTimeout(() => {
    db.ref("users/" + user).once("value", snap => {
      let bal = snap.val()?.balance || 0;
      bal += 4;

      db.ref("users/" + user).set({
        balance: bal
      });
    });

    alert("₹4 added");
  }, 3000);
}

// Withdraw
function withdraw() {
  let upi = document.getElementById("upi").value;

  if (!upi) {
    alert("Enter UPI ID");
    return;
  }

  db.ref("users/" + user).once("value", snap => {
    let bal = snap.val()?.balance || 0;

    if (bal < 50) {
      alert("Minimum ₹50 required");
      return;
    }

    db.ref("withdrawRequests").push({
      user: user,
      amount: bal,
      upi: upi,
      status: "pending"
    });

    db.ref("users/" + user).set({
      balance: 0
    });

    alert("Withdrawal requested");
  });
}
</script>
