<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZyntrixAI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: #020617;
    }
    .hero {
      text-align: center;
      padding: 60px 20px;
    }
    .hero h1 {
      font-size: 40px;
    }
    .hero p {
      color: #94a3b8;
    }
    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>ZyntrixAI</header>

<section class="hero">
  <h1>Powerful AI Tools in One Place</h1>
  <p>Generate content, solve problems, and boost productivity</p>
</section>

<section class="tools">
  <div class="card">
    <h3>Text Generator</h3>
    <button onclick="alert('Coming Soon')">Use Tool</button>
  </div>
  <div class="card">
    <h3>Image Prompt Tool</h3>
    <button onclick="alert('Coming Soon')">Use Tool</button>
  </div>
  <div class="card">
    <h3>Code Helper</h3>
    <button onclick="alert('Coming Soon')">Use Tool</button>
  </div>
</section>

</body>
</html>
