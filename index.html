<!DOCTYPE html>
<html>
<head>
  <title>ZyntrixAI Earn</title>

  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      margin: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 5px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>ZyntrixAI Earn 💸</h1>

<!-- Balance -->
<h2>Balance: ₹ <span id="balance">0</span></h2>

<!-- Share -->
<div class="card">
  <h3>📤 Share & Earn</h3>
  <button onclick="shareApp()">Share App</button>
</div>

<!-- Watch Ad -->
<div class="card">
  <h3>🎥 Watch Ad</h3>
  <button onclick="watchAd()">Watch & Earn ₹4</button>
</div>

<!-- Withdraw -->
<div class="card">
  <h3>💳 Withdraw</h3>
  <input type="text" id="upi" placeholder="Enter UPI ID">
  <button onclick="withdraw()">Withdraw</button>
</div>

<script>
let balance = 0;

// Load saved balance
window.onload = function() {
  let saved = localStorage.getItem("balance");
  if (saved) balance = parseFloat(saved);

  document.getElementById("balance").innerText = balance;
};

// Watch ad
function watchAd() {
  alert("Ad playing...");

  setTimeout(() => {
    balance += 4;
    localStorage.setItem("balance", balance);

    document.getElementById("balance").innerText = balance;

    alert("₹4 added!");
  }, 2000);
}

// Share app
function shareApp() {
  let text = "🔥 Earn money using this app!\n" + window.location.href;

  let url = "https://wa.me/?text=" + encodeURIComponent(text);

  window.open(url, "_blank");
}

// Withdraw
function withdraw() {
  let upi = document.getElementById("upi").value;

  if (!upi) {
    alert("Enter UPI ID");
    return;
  }

  if (balance < 50) {
    alert("Minimum ₹50 required");
    return;
  }

  alert("Withdrawal request submitted");

  balance = 0;
  localStorage.setItem("balance", balance);

  document.getElementById("balance").innerText = balance;
}
</script>

</body>
</html>
