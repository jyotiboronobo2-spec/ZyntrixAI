<!DOCTYPE html>
<html>
<head>
<title>ZyntrixAI Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  text-align: center;
}

.card {
  background: #020617;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
}

button {
  padding: 10px 20px;
  background: #3b82f6;
  border: none;
  color: white;
  border-radius: 5px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>ZyntrixAI Earn 💸</h1>
<p>Watch ads & earn money</p>

<div class="card">
  <h3>💳 Withdraw</h3>

  <input type="text" id="upi" placeholder="Enter UPI ID / Paytm Number"><br><br>

  <button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
  <h3>🎥 Watch Ad & Earn</h3>
  <button onclick="watchAd()">Watch Ad</button>
</div>

<div class="card">
  <h3>📲 Install App & Earn</h3>
  <button onclick="openOffer()">Install Now</button>
</div>

<div class="card">
  <h3>💳 Withdraw</h3>
  <button onclick="withdraw()">Withdraw</button>
</div>

<script>
let balance = 0;

// Load data
window.onload = function () {
  let savedBalance = localStorage.getItem("balance");
  let lastWithdraw = localStorage.getItem("lastWithdraw");

  if (savedBalance) balance = parseFloat(savedBalance);

  document.getElementById("balance").innerText = balance;
  document.getElementById("lastWithdraw").innerText = lastWithdraw || 0;
};

// Watch Ad
function watchAd() {
  alert("Ad playing...");

  setTimeout(() => {
    let total = 10;
    let userEarn = total * 0.4;

    balance += userEarn;

    localStorage.setItem("balance", balance);

    document.getElementById("balance").innerText = balance;

    alert("You earned ₹" + userEarn);
  }, 2000);
}

// Withdraw
function withdraw() {
  let upi = document.getElementById("upi").value;
  let amount = parseFloat(document.getElementById("amount").value);

  if (!upi) {
    alert("Enter UPI ID");
    return;
  }

  if (!amount || amount < 10) {
    alert("Minimum withdraw ₹10");
    return;
  }

  if (amount > balance) {
    alert("Not enough balance");
    return;
  }

  balance -= amount;

  localStorage.setItem("balance", balance);
  localStorage.setItem("lastWithdraw", amount);

  document.getElementById("balance").innerText = balance;
  document.getElementById("lastWithdraw").innerText = amount;

  alert("Withdrawal request submitted ₹" + amount);
}
}
</script>
