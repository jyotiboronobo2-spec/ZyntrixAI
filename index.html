<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZyntrixAI</title>
  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #0f172a, #1e3a8a, #3b82f6, #9333ea);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
  </style>
</head>
<body>

<header>ZyntrixAI</header>

<section class="hero">
  <h1>Powerful AI Tools in One Place</h1>
  <p>Generate content, solve problems, and boost productivity</p>
</section>

<section class="tools">
<div class="card">
  <h3>Text Generator</h3>

<!-- 👉 YEH ADD KARO -->
<select id="aiSelect" style="margin-bottom:10px;padding:8px;">
  <option value="gpt">ChatGPT</option>
  <option value="gemini">Gemini</option>
</select>

<textarea id="inputText" placeholder="Enter your idea..."></textarea>
  <button onclick="generateText()">Generate</button>

  <p id="outputText" style="margin-top:10px;color:#94a3b8;"></p>
</div>
  <div class="card">
    <h3>Code Helper</h3>
    <button onclick="alert('Coming Soon')">Use Tool</button>
  </div>
</section>
 <script>
async function generateText() {
  let input = document.getElementById("inputText").value;
  let output = document.getElementById("outputText");

  // 👇 YAHAN LAGAO
  let ai = document.getElementById("aiSelect").value;

  output.innerText = "Generating...";

  try {
    let url = "";

    if (ai === "gpt") {
  url = "https://api.popcat.xyz/chatbot?msg=" + encodeURIComponent(input);
} else if (ai === "gemini") {
  url = "https://api.popcat.xyz/chatbot?msg=" + encodeURIComponent(input);
}

    let res = await fetch(url);
    let data = await res.json();

    if (ai === "gpt") {
      output.innerText = data.response;
    } else {
      output.innerText = data.response;
    }

  } catch (e) {
    output.innerText = "Error, try again!";
  }
}
</script>
</body>
</html>
